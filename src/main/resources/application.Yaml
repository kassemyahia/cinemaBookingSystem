spring:
  application:
    name: cinemaBookingSystem

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cinema_booking_system?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}

  jpa:
    show-sql: ${JPA_SHOW_SQL:true}
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
